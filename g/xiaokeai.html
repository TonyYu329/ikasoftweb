<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小可爱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}
.container {
    text-align: center;
}
h1 {
    font-size: 3rem;
    color: #fff;
    margin-bottom: 2rem;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: fadeIn 2s ease-out;
}
canvas {
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(147,112,219,0.3);
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
.message {
    color: #b388ff;
    font-size: 1.5rem;
    margin-top: 2rem;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
}
</style>
</head>
<body>
<div class="container">
    <h1>🌸</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="message">✨ 可可爱爱 ✨</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    
    // Rainbow rotating circles
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + t * 0.5;
        const x = cx + Math.cos(angle) * 70;
        const y = cy + Math.sin(angle) * 70;
        ctx.beginPath();
        ctx.arc(x, y, 25 + Math.sin(t + i) * 5, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${i * 60 + t * 30}, 80%, 65%)`;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    // Center
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    gradient.addColorStop(0, '#fff');
    gradient.addColorStop(0.5, '#ffd700');
    gradient.addColorStop(1, '#ff8c00');
    ctx.beginPath();
    ctx.arc(cx, cy, 25 + Math.sin(t * 2) * 3, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Floating hearts
    for (let i = 0; i < 3; i++) {
        const hx = cx + Math.cos(t * 0.7 + i * 2) * (100 + Math.sin(t * 0.3 + i) * 20);
        const hy = cy + Math.sin(t * 0.7 + i * 2) * (70 + Math.cos(t * 0.3 + i) * 20);
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('💕', hx, hy);
    }
    
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
