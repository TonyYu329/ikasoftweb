<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪儿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a1628, #1a1a3e);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}
.container { text-align: center; }
h1 {
    font-size: 3rem;
    color: #fff;
    margin-bottom: 2rem;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    animation: fadeIn 2s ease-out;
}
canvas {
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(200,220,255,0.2);
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
.message {
    color: #a8c8ff;
    font-size: 1.5rem;
    margin-top: 2rem;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
}
</style>
</head>
<body>
<div class="container">
    <h1>❄️</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="message">✨ 像雪一样纯洁 ✨</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    
    ctx.save();
    ctx.translate(cx, cy);
    
    // Snowflake pattern
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + t * 0.05;
        ctx.save();
        ctx.rotate(angle);
        
        // Main branch
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(80, 0);
        ctx.strokeStyle = 'rgba(200, 220, 255, 0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Sub branches
        for (let j = 1; j <= 3; j++) {
            const bx = j * 25;
            for (let side = -1; side <= 1; side += 2) {
                ctx.beginPath();
                ctx.moveTo(bx, 0);
                ctx.lineTo(bx + 15 * side, 15);
                ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }
        
        ctx.restore();
    }
    
    // Center glow
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
    glow.addColorStop(0, '#fff');
    glow.addColorStop(0.5, '#a8c8ff');
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    
    ctx.restore();
    
    // Snowflakes falling
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    for (let i = 0; i < 30; i++) {
        const sx = (i * 137 + t * 30) % canvas.width;
        const sy = (i * 251 + t * 50 + Math.sin(t + i) * 20) % canvas.height;
        const size = 1 + (i % 3);
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
    }
    
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
