<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>娜娜</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    position: relative;
}

h1 {
    font-size: 3rem;
    color: #fff;
    margin-bottom: 2rem;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    animation: fadeIn 2s ease-out;
}

canvas {
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(100, 149, 237, 0.3);
    animation: float 3s ease-in-out infinite;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-10px);
    }
}

.stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}

.star {
    position: absolute;
    color: #fff;
    font-size: 20px;
    animation: starTwinkle 2s ease-in-out infinite;
}

@keyframes starTwinkle {
    0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
    }
    50% {
        opacity: 1;
        transform: scale(1.2);
    }
}

.message {
    color: #6495ed;
    font-size: 1.5rem;
    margin-top: 2rem;
    animation: pulse 2s ease-in-out infinite;
    text-shadow: 0 0 10px rgba(100, 149, 237, 0.5);
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.8;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.05);
    }
}
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>⭐</h1>
        <canvas id="flowerCanvas" width="400" height="400"></canvas>
        <div class="message">✨ 你是我心中最亮的星 ✨</div>
    </div>

<script>
const canvas = document.getElementById('flowerCanvas');
const ctx = canvas.getContext('2d');
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

function drawFlower() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let time = Date.now() / 1000;
    
    // 绘制星星花瓣
    const petals = 8;
    for (let i = 0; i < petals; i++) {
        const angle = (i / petals) * Math.PI * 2 + time * 0.5;
        const x = centerX + Math.cos(angle) * 90;
        const y = centerY + Math.sin(angle) * 90;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 35);
        gradient.addColorStop(0, '#87ceeb');
        gradient.addColorStop(0.5, '#6495ed');
        gradient.addColorStop(1, '#4169e1');
        
        ctx.beginPath();
        ctx.ellipse(0, 0, 35, 18, 0, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        ctx.restore();
    }
    
    // 中心 - 发光星星
    const glow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 35);
    glow.addColorStop(0, '#fff');
    glow.addColorStop(0.3, '#ffd700');
    glow.addColorStop(0.7, '#ffa500');
    glow.addColorStop(1, '#ff8c00');
    
    ctx.beginPath();
    // 五角星
    const spikes = 5;
    const outerRadius = 30 + Math.sin(time * 2) * 3;
    const innerRadius = 12;
    for (let i = 0; i < spikes * 2; i++) {
        const radius = i % 2 === 0 ? outerRadius : innerRadius;
        const starAngle = (i * Math.PI / spikes) - Math.PI / 2 + time * 0.3;
        const sx = centerX + Math.cos(starAngle) * radius;
        const sy = centerY + Math.sin(starAngle) * radius;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // 茎
    ctx.beginPath();
    ctx.moveTo(centerX, centerY + 80);
    ctx.quadraticCurveTo(centerX - 20, centerY + 150, centerX, centerY + 200);
    ctx.strokeStyle = '#4caf50';
    ctx.lineWidth = 6;
    ctx.stroke();
    
    // 叶子
    ctx.save();
    ctx.translate(centerX - 15, centerY + 130);
    ctx.rotate(-0.4);
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#66bb6a';
    ctx.fill();
    ctx.restore();
    
    ctx.save();
    ctx.translate(centerX + 15, centerY + 160);
    ctx.rotate(0.4);
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#66bb6a';
    ctx.fill();
    ctx.restore();
    
    // 星星粒子
    for (let i = 0; i < 8; i++) {
        const px = centerX + Math.cos(time + i * 0.8) * (120 + Math.sin(time * 0.5 + i) * 20);
        const py = centerY + Math.sin(time + i * 0.8) * (120 + Math.cos(time * 0.5 + i) * 20);
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${200 + i * 20}, 80%, 70%, 0.8)`;
        ctx.fill();
    }
    
    requestAnimationFrame(drawFlower);
}

// 添加星星
function createStars() {
    const container = document.querySelector('.stars');
    const emojis = ['⭐', '✨', '🌟', '💫', '🌙'];
    
    setInterval(() => {
        const star = document.createElement('div');
        star.className = 'star';
        star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        star.style.fontSize = (14 + Math.random() * 16) + 'px';
        container.appendChild(star);
        
        setTimeout(() => star.remove(), 4000);
    }, 200);
}

drawFlower();
createStars();
</script>
</body>
</html>
