<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Space War - 太空战机</title>

    <!-- Google Fonts：科幻风格字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- ============================================================
         === CSS IMPORTS =======================================
         ============================================================ -->
    <link rel="stylesheet" href="./css/ui/merged.css?v=4.2.1">

    <!-- ============================================================
         === THREE.JS CDN =====================================
         ============================================================ -->
    <script src="./js/lib/three.min.js"></script>

    <!-- ============================================================
         === JAVASCRIPT IMPORTS ===============================
         ============================================================ -->
    <script src="./js/index_cjs.js?v=4.2.1"></script>
    <script src="./js/index_3d.js?v=4.2.1"></script>
</head>
<body>

    <!-- ============================================================
         === GAME CANVAS =======================================
         ============================================================ -->
    <canvas id="gameCanvas"></canvas>

    <!-- 3D 渲染层（透明 WebGL Canvas，叠在 2D 画布之上） -->
    <canvas id="canvas3d"></canvas>
    
    <!-- ============================================================
         === UI CONTAINER ======================================
         ============================================================ -->
    <div class="game-ui">
        
        <!-- HUD (Heads-Up Display) -->
        <div class="game-hud" id="hudContainer"></div>
        
        <!-- 开始界面覆盖层 -->
        <div class="start-screen" id="startScreen">
            <h1 class="overlay-title">Space War</h1>
            <p class="overlay-subtitle">键盘方向键/WASD 移动 · J/左键射击 · K/右键导弹</p>
            <button class="game-button" id="startButton">开始游戏</button>
            <p class="overlay-version">版本号 V4.3.0</p>
        </div>

        <!-- Game Over Overlay -->
        <div class="game-over-screen" id="gameOverScreen">
            <h1 class="overlay-title">GAME OVER</h1>
            <div class="overlay-subtitle"></div>
            <button class="game-button" id="restartButton">再玩一次</button>
        </div>

    </div>

    <!-- ============================================================
         === 移动端控制按钮（子弹 + 导弹） ====================
         ============================================================ -->
    <div class="mobile-controls" id="mobileControls">
        <button class="mobile-btn bullet-btn" id="btnBullet">
            <svg width="64" height="64" viewBox="0 0 192 192" fill="none">
                <circle cx="96" cy="96" r="84" stroke="url(#bg)" stroke-width="6" opacity="0.5"/>
                <circle cx="96" cy="96" r="66" stroke="#ffdd44" stroke-width="3" opacity="0.25" stroke-dasharray="12 8"/>
                <circle cx="96" cy="96" r="96" fill="none" stroke="#ffee88" stroke-width="8" opacity="0.5"/>
                <path d="M96 29 Q114 35 123 60 L123 105 L114 137 L78 137 L69 105 L69 60 Q78 35 96 29 Z" fill="#ffdd44"/>
                <rect x="83" y="137" width="27" height="13" rx="4" fill="#ff9922" opacity="0.8"/>
                <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffdd44"/><stop offset="1" stop-color="#ff8800"/></linearGradient></defs>
            </svg>
        </button>
        <button class="mobile-btn missile-btn" id="btnMissile">
            <svg width="64" height="64" viewBox="0 0 192 192" fill="none">
                <circle cx="96" cy="96" r="84" stroke="url(#mg)" stroke-width="6" opacity="0.5"/>
                <circle cx="96" cy="96" r="66" stroke="#ff6622" stroke-width="3" opacity="0.25" stroke-dasharray="12 8"/>
                <circle cx="96" cy="96" r="96" fill="none" stroke="#ff8844" stroke-width="8" opacity="0.5"/>
                <path d="M96 -18 L54 66 L66 66 L63 126 L129 126 L126 66 L138 66 Z" fill="#ff6622"/>
                <rect x="72" y="126" width="48" height="24" rx="6" fill="#ffaa00" opacity="0.9"/>
                <defs><linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff6622"/><stop offset="1" stop-color="#ff2200"/></linearGradient></defs>
            </svg>
        </button>
    </div>

    <!-- ============================================================
         === BUTTON EVENT BINDING =============================
         ============================================================ -->
    <script>
        // Bind button events after DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[HTML] DOM ready, binding buttons...');
            
            // Start button
            var startBtn = document.getElementById('startButton');
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    console.log('[HTML] Start button clicked');
                    if (window.startGame) {
                        window.startGame();
                    } else {
                        console.error('[HTML] startGame not found!');
                    }
                });
            }
            
            // Restart button
            var restartBtn = document.getElementById('restartButton');
            if (restartBtn) {
                restartBtn.addEventListener('click', function() {
                    console.log('[HTML] Restart button clicked');
                    if (window.resetGame) {
                        window.resetGame();
                    } else {
                        console.error('[HTML] resetGame not found!');
                    }
                });
            }
        });
    </script>
</body>
</html>
