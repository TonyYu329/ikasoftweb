<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花花</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    position: relative;
}

h1 {
    font-size: 3rem;
    color: #fff;
    margin-bottom: 2rem;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    animation: fadeIn 2s ease-out;
}

canvas {
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(255, 105, 180, 0.3);
    animation: float 3s ease-in-out infinite;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-10px);
    }
}

.hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}

.heart {
    position: absolute;
    font-size: 24px;
    animation: heartFall 4s linear infinite;
    opacity: 0.6;
}

@keyframes heartFall {
    0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 0.6;
    }
    100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

.message {
    color: #ff69b4;
    font-size: 1.5rem;
    margin-top: 2rem;
    animation: pulse 2s ease-in-out infinite;
    text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.8;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.05);
    }
}
</style>
</head>
<body>
    <div class="hearts"></div>
    <div class="container">
        <h1>🌸</h1>
        <canvas id="flowerCanvas" width="400" height="400"></canvas>
        <div class="message">✨ 最美的花，送给最美的你 ✨</div>
    </div>

<script>
const canvas = document.getElementById('flowerCanvas');
const ctx = canvas.getContext('2d');
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

function drawFlower() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let time = Date.now() / 1000;
    
    // 绘制花瓣
    const petals = 12;
    for (let i = 0; i < petals; i++) {
        const angle = (i / petals) * Math.PI * 2 + time * 0.5;
        const x = centerX + Math.cos(angle) * 80;
        const y = centerY + Math.sin(angle) * 80;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        
        // 花瓣渐变
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
        gradient.addColorStop(0, '#ff69b4');
        gradient.addColorStop(0.5, '#ff1493');
        gradient.addColorStop(1, '#c71585');
        
        ctx.beginPath();
        ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        ctx.restore();
    }
    
    // 花蕊 - 发光效果
    const glow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
    glow.addColorStop(0, '#fff');
    glow.addColorStop(0.3, '#ffeb3b');
    glow.addColorStop(0.7, '#ff9800');
    glow.addColorStop(1, '#ff5722');
    
    ctx.beginPath();
    ctx.arc(centerX, centerY, 25 + Math.sin(time * 3) * 3, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    
    // 茎
    ctx.beginPath();
    ctx.moveTo(centerX, centerY + 80);
    ctx.quadraticCurveTo(centerX + 30, centerY + 150, centerX, centerY + 200);
    ctx.strokeStyle = '#4caf50';
    ctx.lineWidth = 6;
    ctx.stroke();
    
    // 叶子
    ctx.save();
    ctx.translate(centerX + 20, centerY + 130);
    ctx.rotate(0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, 25, 12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#66bb6a';
    ctx.fill();
    ctx.restore();
    
    ctx.save();
    ctx.translate(centerX - 15, centerY + 160);
    ctx.rotate(-0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#66bb6a';
    ctx.fill();
    ctx.restore();
    
    // 粒子效果
    for (let i = 0; i < 5; i++) {
        const px = centerX + Math.cos(time * 2 + i * 1.3) * (100 + Math.sin(time + i) * 30);
        const py = centerY + Math.sin(time * 2 + i * 1.3) * (100 + Math.cos(time + i) * 30);
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${(time * 50 + i * 60) % 360}, 100%, 70%, 0.8)`;
        ctx.fill();
    }
    
    requestAnimationFrame(drawFlower);
}

// 添加爱心粒子
function createHearts() {
    const container = document.querySelector('.hearts');
    const emojis = ['💕', '💗', '💖', '🌸', '✨', '💝'];
    
    setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = (3 + Math.random() * 2) + 's';
        heart.style.fontSize = (16 + Math.random() * 20) + 'px';
        container.appendChild(heart);
        
        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

drawFlower();
createHearts();
</script>
</body>
</html>
