<div align="center" class="style2"><strong>如何使用</strong></div>
<div align="center"></div>
<table width="100%" border="0" cellpadding="0" cellspacing="1" bgcolor="#336699">
  <tr>
    <td height="21" background="tabs_m_tile.gif"><span class="style2"><font color="#336600">文件夹加密隐藏王非常容易使用！</font></span></td>
  </tr>
  <tr>
    <td height="200" valign="middle" bgcolor="#FFFFFF"> <table width="100%" height="100%" border="0" cellpadding="4" cellspacing="1" bgcolor="#CCCCCC">
      <tr bgcolor="#FFFFFF">
        <td width="100" valign="middle"><div align="center" class="style1">隐藏文件夹 </div></td>
        <td valign="middle"><p><br>
          1.在软件左侧目录中选中您要隐藏的文件夹。</p>
          <p>          2.点击工具栏中的 添加 按钮添加到右侧的列表中。</p>
          <p>3.选中右侧列表中的文件夹，点击工具栏中的 隐藏 按钮即可。<br>
            <br>
          </p></td>
      </tr>
      <tr bgcolor="#FFFFFF">
        <td valign="middle"><div align="center"><strong>解除隐藏</strong></div></td>
        <td valign="middle"><p><br>
          1.在软件右侧文件夹隐藏列表中选中您要解除隐藏的文件夹。</p>
          <p>          2.点击工具栏中的 解除隐藏 按钮即可。 <br>
            <br>
          </p></td>
      </tr>
      <tr bgcolor="#FFFFFF">
        <td valign="middle"><div align="center"><strong>打开目录</strong></div></td>
        <td valign="middle"><p>          <br>
          当您的隐藏文件夹解除隐藏后，您可以选中该隐藏项目，并点击工具栏的“打开”按钮来打开隐藏目录
          。<br>
          <br>
        </p></td>
      </tr>
      <tr bgcolor="#FFFFFF">
        <td valign="middle"><div align="center"><strong>搜索隐藏目录</strong></div></td>
        <td valign="middle"><p>          <br>
          当您的文件夹列表被破坏，或您找不到隐藏的文件夹时使用此功能可以帮您找回您的文件夹。<br>
          <br>
        </p>          </td>
      </tr>
